<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>ASR Demo</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="layout">

    <aside class="sidebar">

        <h3>Uploaded files</h3>

        {% if files %}
            <ul>
                {% for file in files %}
                <li>
                    <strong>{{ file }}</strong>

                    <audio controls>
                        <source src="{{ url_for('uploaded_file', filename=file) }}" type="audio/wav">
                    </audio>

                    <form method="POST" style="display:inline;">
                        <input type="hidden" name="audio_file" value="{{ file }}">
                        <input type="hidden" name="engine" value="{{ request.form.engine or 'canary' }}">
                        <input type="hidden" name="device" value="{{ request.form.device or 'cpu' }}">
                        <button type="submit">Use</button>
                    </form>

                    <form method="POST" action="{{ url_for('delete_file', filename=file) }}" style="display:inline;">
                        <button type="submit" style="background:#c0392b;">Delete</button>
                    </form>
                </li>
                {% endfor %}
            </ul>
        {% else %}
            <p>No files</p>
        {% endif %}

    </aside>

    <main class="main">
        <div class="container">

            <h2>ASR Demo</h2>

            <h3>Upload WAV file</h3>
            <form method="POST" enctype="multipart/form-data">
                <input type="file" name="file" accept=".wav">
                <button type="submit">Upload</button>
            </form>

            <hr>

            <form method="POST">
                <h3>Model settings</h3>

                <select name="engine">
                    <option value="canary">canary</option>
                    <option value="parakeet">parakeet</option>
                    <option value="whisper">whisper</option>
                </select>

                <select name="device">
                    <option value="cpu">CPU</option>
                    <option value="cuda">GPU</option>
                </select>
            </form>

            {% if error %}
            <div class="card error">
                {{ error }}
            </div>
            {% endif %}

            {% if transcript %}
            <div class="card">
                <h3>Transcript</h3>

                <textarea readonly>{{ transcript }}</textarea>

                <div class="button-row">
                    <form method="POST" action="/download">
                        <input type="hidden" name="transcript" value="{{ transcript }}">
                        <button type="submit">Download</button>
                    </form>

                    <form method="POST">
                        <button type="submit" name="action" value="clear">Clear</button>
                    </form>
                </div>

            </div>
            {% endif %}

        </div>
    </main>

</div>

</body>
</html>
