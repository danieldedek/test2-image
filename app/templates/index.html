<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <title>ASR Demo</title>
    <style>
        body {
            font-family: Arial;
            margin: 40px;
        }

        textarea {
            width: 100%;
            height: 200px;
        }
    </style>
</head>

<body>
    <h2>Transcription</h2>

    <form method="POST">

        <label>Existing WAV file (in uploads/):</label>
        <input type="text" name="audio_file" placeholder="example.wav">

        <br><br>

        <label>Model:</label>
        <select name="engine">
            <option value="canary">canary</option>
            <option value="parakeet">parakeet</option>
            <option value="whisper">whisper</option>
        </select>

        <br><br>

        <button type="submit" name="action" value="transcribe">Transcribe</button>
        <button type="submit" name="action" value="clear">Clear</button>
    </form>

    {% if audio_filename %}
    <h3>Play audio</h3>
    <audio controls>
        <source src="{{ url_for('uploaded_file', filename=audio_filename) }}" type="audio/wav">
        Your browser does not support the audio element.
    </audio>
    {% endif %}

    {% if transcript %}
    <h3>Transcription</h3>
    <textarea readonly>{{ transcript }}</textarea>
    <form method="POST" action="/download">
        <input type="hidden" name="transcript" value="{{ transcript }}">
        <button type="submit">Download TXT</button>
    </form>
    {% endif %}

    {% if error %}
    <p style="color:red">{{ error }}</p>
    {% endif %}

</body>

</html>
