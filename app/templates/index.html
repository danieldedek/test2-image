<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>ASR Demo</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="layout">

    <aside class="sidebar">

        <h3>Uploaded files</h3>

        <form method="GET" class="search-form">
            <input type="text" name="search" value="{{ search }}" placeholder="Search...">
            <input type="hidden" name="sort" value="{{ sort }}">
            <button>Go</button>
        </form>

        {% if files %}
            <ul>
                {% for file in files %}
                <li>
                    <strong>{{ file }}</strong>

                    <audio controls>
                        <source src="{{ url_for('uploaded_file', filename=file) }}" type="audio/wav">
                    </audio>

                    <button type="submit" form="main-form" name="audio_file" value="{{ file }}">
                        Use
                    </button>

                    <form method="POST" action="{{ url_for('delete_file', filename=file)" style="display:inline;">
                        <button type="submit" style="background:#c0392b;">Delete</button>
                    </form>
                </li>
                {% endfor %}
            </ul>
        {% endif %}

    </aside>

    <main class="main">
        <div class="container">

            <h2>ASR Demo</h2>

            <form id="main-form" method="POST" enctype="multipart/form-data">

                <input type="file" name="file" accept=".wav">
                <button type="submit">Upload</button>

                <hr>

                <select name="engine">
                    <option value="canary" {% if engine=="canary" %}selected{% endif %}>canary</option>
                    <option value="parakeet" {% if engine=="parakeet" %}selected{% endif %}>parakeet</option>
                    <option value="whisper" {% if engine=="whisper" %}selected{% endif %}>whisper</option>
                </select>

                <select name="device">
                    <option value="cpu" {% if device=="cpu" %}selected{% endif %}>CPU</option>
                    <option value="cuda" {% if device=="cuda" %}selected{% endif %}>GPU</option>
                </select>

                <hr>

                <h3>Canary settings</h3>

                <select name="language">
                    <option value="cs" {% if language=="cs" %}selected{% endif %}>Czech</option>
                    <option value="en" {% if language=="en" %}selected{% endif %}>English</option>
                </select>

                <select name="strategy">
                    <option value="greedy" {% if strategy=="greedy" %}selected{% endif %}>Greedy</option>
                    <option value="beam" {% if strategy=="beam" %}selected{% endif %}>Beam</option>
                </select>

                <div class="param">
                    <label>Beam size (vyšší = přesnější, pomalejší)</label>
                    <input type="number" name="beam_size" value="{{ beam_size }}" min="1" max="10">
                </div>

                <div class="param">
                    <label>Length penalty (1.0 = neutrální)</label>
                    <input type="number" step="0.1" name="len_pen" value="{{ len_pen }}">
                </div>

                <div class="param">
                    <label>Batch size (vyšší = rychlejší na GPU)</label>
                    <input type="number" name="batch_size" value="{{ batch_size }}" min="1" max="16">
                </div>

                <div class="param">
                    <label>FP16 (rychlejší na GPU)</label>
                    <label class="switch">
                        <input type="checkbox" name="fp16" {% if use_fp16 %}checked{% endif %}>
                        <span class="slider"></span>
                    </label>
                </div>

                <div class="param">
                    <label>Disable hypotheses (zapni = jen čistý text)</label>
                    <label class="switch">
                        <input type="checkbox" name="disable_hypotheses" {% if disable_hypotheses %}checked{% endif %}>
                        <span class="slider"></span>
                    </label>
                </div>

            </form>

            {% if transcript %}
            <div class="card">
                <textarea readonly>{{ transcript }}</textarea>
            </div>
            {% endif %}

            {% if error %}
            <div class="card error">
                {{ error }}
            </div>
            {% endif %}

        </div>
    </main>

</div>

</body>
</html>
