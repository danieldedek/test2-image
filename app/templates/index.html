<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>ASR Demo</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h2>Transcription</h2>

    <form method="POST">
        <div>
            <label>Existing WAV file (in uploads/):</label>
            <input type="text" name="audio_file" placeholder="example.wav">
        </div>

        <div>
            <h3>Model</h3>
            <select name="engine">
                <option value="canary">canary</option>
                <option value="parakeet">parakeet</option>
                <option value="whisper">whisper</option>
            </select>
        </div>

        <div>
            <label>Device:</label>
            <select name="device">
                <option value="cpu">CPU</option>
                <option value="cuda">GPU</option>
            </select>
        </div>

        <div>
            <button type="submit">Transcribe</button>
            <button type="submit" name="action" value="clear">Clear</button>
        </div>
    </form>

    {% if audio_filename %}
    <div class="card">
        <h3>Play audio</h3>
        <audio controls>
            <source src="{{ url_for('uploaded_file', filename=audio_filename) }}" type="audio/wav">
            Your browser does not support the audio element.
        </audio>
    </div>
    {% endif %}

    {% if transcript %}
    <div class="card">
        <h3>Transcript</h3>
        <textarea readonly>{{ transcript }}</textarea>
        <form method="POST" action="/download" style="margin-top: 10px;">
            <input type="hidden" name="transcript" value="{{ transcript }}">
            <button>Download</button>
        </form>
    </div>
    {% endif %}

</div>

</body>
</html>
