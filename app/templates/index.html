<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>ASR Demo</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h2>Transcription</h2>

    <h3>Upload WAV file</h3>
    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="file" accept=".wav">
        <button type="submit">Upload</button>
    </form>

    <hr>

    <form method="POST">
        <div>
            <label>Existing WAV file:</label>
            <input type="text" name="audio_file" placeholder="example.wav">
        </div>

        <div>
            <h3>Model</h3>
            <select name="engine">
                <option value="canary">canary</option>
                <option value="parakeet">parakeet</option>
                <option value="whisper">whisper</option>
            </select>
        </div>

        <div>
            <label>Device:</label>
            <select name="device">
                <option value="cpu">CPU</option>
                <option value="cuda">GPU</option>
            </select>
        </div>

        <div>
            <button type="submit">Transcribe</button>
            <button type="submit" name="action" value="clear">Clear</button>
        </div>
    </form>

    {% if error %}
    <div class="card" style="background:#ffe6e6; color:#c0392b;">
        {{ error }}
    </div>
    {% endif %}

    {% if files %}
    <div class="card">
        <h3>Uploaded files</h3>
        <ul>
            {% for file in files %}
            <li>
                <strong>{{ file }}</strong>

                <audio controls>
                    <source src="{{ url_for('uploaded_file', filename=file) }}" type="audio/wav">
                </audio>

                <form method="POST" style="display:inline;">
                    <input type="hidden" name="audio_file" value="{{ file }}">
                    <button type="submit">Use</button>
                </form>

                <form method="POST" action="{{ url_for('delete_file', filename=file) }}" style="display:inline;">
                    <button type="submit" style="background:#c0392b;">Delete</button>
                </form>
            </li>
            {% endfor %}
        </ul>
    </div>
    {% endif %}

    {% if audio_filename %}
    <div class="card">
        <h3>Play audio</h3>
        <audio controls>
            <source src="{{ url_for('uploaded_file', filename=audio_filename) }}" type="audio/wav">
        </audio>
    </div>
    {% endif %}

    {% if transcript %}
    <div class="card">
        <h3>Transcript</h3>
        <textarea readonly>{{ transcript }}</textarea>
        <form method="POST" action="/download">
            <input type="hidden" name="transcript" value="{{ transcript }}">
            <button>Download</button>
        </form>
    </div>
    {% endif %}

</div>

</body>
</html>
