<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <title>ASR Demo</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="layout">

    <aside class="sidebar">

        <h3>Files</h3>

        <ul>
            {% for file in files %}
            <li>

                <strong>{{ file }}</strong>

                <audio controls>
                    <source src="{{ url_for('uploaded_file', filename=file) }}">
                </audio>

                <form method="POST">
                    <input type="hidden" name="action" value="use_file">
                    <input type="hidden" name="audio_file" value="{{ file }}">
                    <input type="hidden" name="selected_model" value="{{ selected_model }}">
                    <button type="submit">Use</button>
                </form>

            </li>
            {% endfor %}
        </ul>

    </aside>

    <main class="main">

        <div class="container">

            <h2>ASR Demo</h2>

            <form method="POST" enctype="multipart/form-data">
                <input type="hidden" name="action" value="upload">
                <input type="file" name="file">
                <button type="submit">Upload</button>
            </form>

            <hr>

            <form method="POST">

                <input type="hidden" name="action" value="select_model">

                <label>Model</label>
                <select name="selected_model">
                    <option value="canary" {% if selected_model=="canary" %}selected{% endif %}>Canary</option>
                    <option value="parakeet" {% if selected_model=="parakeet" %}selected{% endif %}>Parakeet</option>
                </select>

                <button type="submit">Select model</button>

            </form>

            <hr>

            <form method="POST">

                <input type="hidden" name="action" value="noop">
                <input type="hidden" name="selected_model" value="{{ selected_model }}">

                <label>Device</label>
                <select name="device">
                    <option value="cpu" {% if device=="cpu" %}selected{% endif %}>CPU</option>
                    <option value="cuda" {% if device=="cuda" %}selected{% endif %}>GPU</option>
                </select>

                <label>Strategy</label>
                <select name="strategy">
                    <option value="greedy" {% if strategy=="greedy" %}selected{% endif %}>Greedy</option>
                    <option value="beam" {% if strategy=="beam" %}selected{% endif %}>Beam</option>
                </select>

                <div class="param">
                    <label>Beam size</label>
                    <input type="number" name="beam_size" value="{{ beam_size }}">
                </div>

                {% if selected_model == "canary" %}

                <h3>Canary parameters</h3>

                <label>Language</label>
                <select name="language">
                    <option value="cs" {% if language=="cs" %}selected{% endif %}>CS</option>
                    <option value="en" {% if language=="en" %}selected{% endif %}>EN</option>
                </select>

                <div class="param">
                    <label>Length penalty</label>
                    <input type="number" step="0.1" name="len_pen" value="{{ len_pen }}">
                </div>

                <div class="param">
                    <label>Batch size</label>
                    <input type="number" name="batch_size" value="{{ batch_size }}">
                </div>

                <div class="param">
                    <label>
                        <input type="checkbox" name="return_hypotheses"
                               {% if return_hypotheses %}checked{% endif %}>
                        Return hypotheses
                    </label>
                </div>

                {% endif %}

                {% if selected_model == "parakeet" %}

                <h3>Parakeet parameters</h3>

                <div class="param">
                    <label>Alpha</label>
                    <input type="number" step="0.1" name="alpha" value="{{ alpha }}">
                </div>

                <div class="param">
                    <label>Beta</label>
                    <input type="number" step="0.1" name="beta" value="{{ beta }}">
                </div>

                <div class="param">
                    <label>Batch size</label>
                    <input type="number" name="batch_size" value="{{ batch_size }}">
                </div>

                {% endif %}

                <div class="param">
                    <label>
                        <input type="checkbox" name="fp16" {% if use_fp16 %}checked{% endif %}>
                        FP16
                    </label>
                </div>

            </form>

        </div>

    </main>

</div>

</body>
</html>
